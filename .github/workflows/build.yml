name: Build Android Release APK

on:
  workflow_dispatch: # Enables manual execution trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # Ensured explicit setup tool to locate the NDK installation cleanly
    - name: Set up Android NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.1.8937393'

    - name: Decode Release Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew
      working-directory: android

    - name: Build Production Bundle
      run: ./gradlew assembleRelease
      working-directory: android
      env:
        MY_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        MY_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        MY_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Production Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
